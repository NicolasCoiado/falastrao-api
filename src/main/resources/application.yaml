spring:
  application:
    name: falastrao

  datasource:
    url: jdbc:postgresql://localhost:5432/falastrao
    username: ${POSTGRES_USER}
    password: ${POSTGRES_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  jwt:
    secret: ${SECRET_JWT}
    expiration: 3600000
    issuer: Falastrao-API
server:
  port: 8080