spring:
  application:
    name: falastrao

  datasource:
    url: jdbc:postgresql://localhost:5432/falastrao
    username: ${POSTGRES_USER}
    password: ${POSTGRES_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  jwt:
    secret: ${SECRET_JWT}
    expiration: 3600000
    issuer: Falastrao-API

  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

  gemini.api.key: ${GEMINI_API_KEY}
  gemini.topics.max-suggestions: 5


app:
  base-url: ${BASE_URL:http://localhost:8080}



server:
  port: 8080